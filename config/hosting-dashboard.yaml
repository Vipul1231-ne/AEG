# Dashboard-only hosting profile for managed web hosts.
# It disables honeypot listener ports and exposes only the Flask dashboard.

general:
  project_name: AegisTrap
  version: 1.0.0
  log_level: INFO

ssh:
  name: ssh
  protocol: ssh
  enabled: false
  listen_host: 0.0.0.0
  listen_port: 2222
  banner: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"
  max_concurrent: 50
  session_timeout: 300

ftp:
  name: ftp
  protocol: ftp
  enabled: false
  listen_host: 0.0.0.0
  listen_port: 2121
  banner: "vsftpd 3.0.5"
  max_concurrent: 50
  session_timeout: 300

http:
  name: http
  protocol: http
  enabled: false
  listen_host: 0.0.0.0
  listen_port: 8080
  banner: "Apache/2.4.57 (Ubuntu)"
  max_concurrent: 100
  session_timeout: 120

https:
  name: https
  protocol: https
  enabled: false
  listen_host: 0.0.0.0
  listen_port: 8443
  banner: "Apache/2.4.57 (Ubuntu)"
  max_concurrent: 100
  session_timeout: 120

dashboard:
  enabled: true
  host: 0.0.0.0
  port: 10000
  secret_key: ""
  debug: false
  refresh_interval_ms: 5000

logging:
  directory: logs
  level: INFO
  max_bytes: 10485760
  backup_count: 10
  console: true

database:
  path: data/aegistrap.db
  pool_size: 5
  enable_wal: true

threat:
  window_seconds: 60
  failed_login_threshold: 5
  request_rate_threshold: 100
  directory_bruteforce_threshold: 30
  unique_user_threshold: 10
  credential_stuffing_threshold: 15
  ssh_command_threshold: 50
  ftp_command_threshold: 100
  auto_block_threshold: 200
